<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#040719">

    <title>ЧУКАЕВ ЛАБ | AI Ecosystem</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;600;700&family=Russo+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030518;
            --cyan: #27f5ff;
            --cyan-soft: rgba(39, 245, 255, 0.42);
            --cyan-dark: rgba(39, 245, 255, 0.12);
            --purple: #9a55ff;
            --purple-soft: rgba(154, 85, 255, 0.45);
            --purple-dark: rgba(154, 85, 255, 0.12);
            --gold: #ffb727;
            --gold-soft: rgba(255, 183, 39, 0.45);
            --gold-dark: rgba(255, 183, 39, 0.12);
            --white: #f8fbff;
            --muted: #b8c0d8;
            --content-width: 760px;
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--white);
            font-family: "Jura", sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(25, 213, 255, 0.16), transparent 38%),
                radial-gradient(circle at 80% 55%, rgba(132, 59, 255, 0.15), transparent 38%),
                radial-gradient(circle at 10% 95%, rgba(0, 214, 255, 0.1), transparent 38%),
                linear-gradient(180deg, #020817 0%, #06051b 48%, #040316 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(40, 223, 255, 0.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(40, 223, 255, 0.075) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            animation: gridMove 18s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -3;
            pointer-events: none;
            opacity: 0.2;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(255,255,255,.025) 4px);
            animation: scanlines 12s linear infinite;
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient::before,
        .ambient::after {
            content: "";
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .17;
        }

        .ambient::before {
            top: -170px;
            left: -220px;
            background: var(--cyan);
            animation: ambientOne 11s ease-in-out infinite alternate;
        }

        .ambient::after {
            right: -240px;
            bottom: -170px;
            background: var(--purple);
            animation: ambientTwo 13s ease-in-out infinite alternate;
        }

        .page {
            width: min(100%, var(--content-width));
            min-height: 100vh;
            margin: 0 auto;
            padding: max(36px, env(safe-area-inset-top)) 24px max(44px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-zone {
            position: relative;
            width: 310px;
            height: 310px;
            margin-top: 4px;
            display: grid;
            place-items: center;
            filter:
                drop-shadow(0 0 22px rgba(35, 238, 255, .22))
                drop-shadow(0 0 45px rgba(132, 70, 255, .14));
        }

        .logo-halo {
            position: absolute;
            width: 218px;
            height: 218px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37,245,255,.18), transparent 66%);
            filter: blur(8px);
            animation: haloPulse 3.3s ease-in-out infinite;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .ring-a {
            width: 284px;
            height: 284px;
            border: 2px dashed rgba(37,245,255,.39);
            box-shadow: inset 0 0 22px rgba(37,245,255,.08), 0 0 18px rgba(37,245,255,.08);
            animation: rotateRight 18s linear infinite;
        }

        .ring-b {
            width: 252px;
            height: 252px;
            border: 4px solid transparent;
            border-top-color: var(--purple);
            border-right-color: rgba(39,245,255,.85);
            border-bottom-color: rgba(154,85,255,.18);
            filter: drop-shadow(0 0 7px var(--purple-soft));
            animation: rotateLeft 9s linear infinite;
        }

        .ring-c {
            width: 228px;
            height: 228px;
            border: 2px solid rgba(39,245,255,.2);
            border-left-color: transparent;
            border-right-color: transparent;
            animation: rotateRight 6.5s linear infinite;
        }

        .segment-ring {
            position: absolute;
            width: 270px;
            height: 270px;
            border-radius: 50%;
            background:
                conic-gradient(
                    from 20deg,
                    transparent 0deg 32deg,
                    rgba(39,245,255,.95) 32deg 48deg,
                    transparent 48deg 113deg,
                    rgba(154,85,255,.9) 113deg 135deg,
                    transparent 135deg 217deg,
                    rgba(39,245,255,.85) 217deg 233deg,
                    transparent 233deg 309deg,
                    rgba(154,85,255,.9) 309deg 326deg,
                    transparent 326deg
                );
            -webkit-mask: radial-gradient(circle, transparent 0 124px, #000 125px 134px, transparent 135px);
            mask: radial-gradient(circle, transparent 0 124px, #000 125px 134px, transparent 135px);
            animation: rotateRight 12s linear infinite;
            filter: drop-shadow(0 0 6px rgba(39,245,255,.55));
        }

        .logo-frame {
            position: relative;
            width: 204px;
            height: 204px;
            z-index: 5;
            padding: 7px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--cyan), #8afaff, var(--purple), #e355ff, var(--cyan));
            box-shadow:
                0 0 14px var(--cyan),
                0 0 34px rgba(39,245,255,.48),
                0 0 65px rgba(154,85,255,.25);
            animation: logoFloat 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
        }

        .logo-frame::before {
            content: "";
            position: absolute;
            inset: 7px;
            z-index: 2;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.35);
            pointer-events: none;
        }

        .logo-frame::after {
            content: "";
            position: absolute;
            inset: -4px;
            z-index: -1;
            border-radius: 50%;
            border: 1px solid rgba(39,245,255,.5);
            animation: logoShockwave 2.8s ease-out infinite;
        }

        .logo-image {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #08122d;
            animation: imageBreath 5s ease-in-out infinite;
        }

        .logo-shine {
            position: absolute;
            inset: 10px;
            z-index: 7;
            overflow: hidden;
            border-radius: 50%;
            pointer-events: none;
        }

        .logo-shine::before {
            content: "";
            position: absolute;
            top: -40%;
            left: -85%;
            width: 48%;
            height: 190%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.34), transparent);
            transform: rotate(22deg);
            animation: shine 4.8s ease-in-out infinite;
        }

        .title {
            margin: 2px 0 0;
            font-family: "Russo One", "Jura", sans-serif;
            font-size: clamp(38px, 8vw, 60px);
            font-weight: 400;
            line-height: 1;
            letter-spacing: .075em;
            text-align: center;
            text-transform: uppercase;
            color: #eaffff;
            text-shadow: 0 0 5px #fff, 0 0 12px var(--cyan), 0 0 30px rgba(39,245,255,.62);
            animation: titlePulse 4s ease-in-out infinite;
        }

        .subtitle {
            margin: 19px 0 48px;
            color: #d4d8ea;
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 600;
            line-height: 1.45;
            letter-spacing: .025em;
            text-align: center;
            text-shadow: 0 0 13px rgba(139,169,255,.28);
        }

        .links {
            width: 100%;
            display: grid;
            gap: 26px;
        }

        .cyber-button {
            --accent: var(--cyan);
            --accent-soft: var(--cyan-soft);
            --accent-dark: var(--cyan-dark);
            position: relative;
            min-height: 132px;
            padding: 20px 31px 20px 24px;
            isolation: isolate;
            overflow: hidden;
            display: grid;
            grid-template-columns: 104px 1fr;
            align-items: center;
            gap: 25px;
            color: var(--white);
            text-decoration: none;
            background: linear-gradient(105deg, rgba(11,33,62,.93), rgba(10,17,44,.95) 56%, rgba(11,10,39,.96));
            border: 2px solid var(--accent);
            border-radius: 4px;
            box-shadow: 0 0 8px var(--accent-soft), 0 0 24px rgba(0,0,0,.38), inset 0 0 26px var(--accent-dark);
            clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
            transform: translateZ(0);
            transition: transform .25s ease, filter .25s ease, box-shadow .25s ease;
        }

        .cyber-button.purple {
            --accent: var(--purple);
            --accent-soft: var(--purple-soft);
            --accent-dark: var(--purple-dark);
        }

        .cyber-button.gold {
            --accent: var(--gold);
            --accent-soft: var(--gold-soft);
            --accent-dark: var(--gold-dark);
        }

        .cyber-button::before {
            content: "";
            position: absolute;
            inset: 7px;
            z-index: -2;
            border: 1px solid var(--accent-soft);
            clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 15px, 100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0 calc(100% - 15px), 0 15px);
        }

        .cyber-button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -60%;
            z-index: -1;
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent-dark), transparent);
            transform: skewX(-24deg);
            animation: buttonScan 4.6s ease-in-out infinite;
        }

        .circuit-lines {
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: .33;
            pointer-events: none;
            background:
                linear-gradient(90deg, transparent 0 42%, var(--accent-soft) 42% 42.5%, transparent 42.5% 100%),
                linear-gradient(0deg, transparent 0 72%, var(--accent-soft) 72% 73%, transparent 73% 100%);
            -webkit-mask-image: repeating-linear-gradient(90deg, #000 0 35px, transparent 35px 49px);
            mask-image: repeating-linear-gradient(90deg, #000 0 35px, transparent 35px 49px);
        }

        .corner {
            position: absolute;
            width: 28px;
            height: 28px;
            pointer-events: none;
        }

        .corner-tl {
            top: 0;
            left: 0;
            border-top: 4px solid var(--accent);
            border-left: 4px solid var(--accent);
        }

        .corner-br {
            right: 0;
            bottom: 0;
            border-right: 4px solid var(--accent);
            border-bottom: 4px solid var(--accent);
        }

        .icon-wrap {
            position: relative;
            width: 104px;
            height: 88px;
            display: grid;
            place-items: center;
            border-right: 1px solid var(--accent-soft);
            filter: drop-shadow(0 0 9px var(--accent-soft));
        }

        .icon-orbit {
            position: absolute;
            width: 78px;
            height: 78px;
            border: 1px solid var(--accent-soft);
            border-radius: 50%;
            animation: iconRotate 8s linear infinite;
        }

        .icon-orbit::before {
            content: "";
            position: absolute;
            inset: 6px;
            border: 1px dashed var(--accent);
            border-radius: 50%;
            animation: rotateLeft 5s linear infinite;
        }

        .telegram-icon {
            position: relative;
            z-index: 2;
            width: 54px;
            height: 54px;
            filter: drop-shadow(0 0 5px #fff) drop-shadow(0 0 13px var(--accent));
        }

        .button-copy {
            position: relative;
            z-index: 3;
        }

        .button-title {
            display: block;
            font-size: clamp(20px, 4.3vw, 31px);
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255,255,255,.22);
        }

        .button-note {
            display: block;
            margin-top: 7px;
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .2em;
            text-align: center;
            text-transform: uppercase;
            opacity: .86;
        }

        .launch-tag {
            position: absolute;
            top: -1px;
            right: 23px;
            z-index: 10;
            min-width: 132px;
            padding: 8px 14px 7px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .15em;
            text-align: center;
            text-transform: uppercase;
            background: linear-gradient(180deg, #b980ff, #7433e9);
            border: 1px solid rgba(216,181,255,.75);
            border-radius: 0 0 7px 7px;
            box-shadow: 0 0 8px #a766ff, 0 0 18px rgba(154,85,255,.85);
            animation: tagPulse 2.3s ease-in-out infinite;
        }

        .cyber-button:hover,
        .cyber-button:focus-visible {
            transform: translateY(-4px) scale(1.008);
            filter: brightness(1.15);
            box-shadow: 0 0 12px var(--accent), 0 0 32px var(--accent-soft), inset 0 0 34px var(--accent-dark);
            outline: none;
        }

        .cyber-button:active { transform: scale(.985); }

        .footer {
            margin-top: 42px;
            color: rgba(198,205,232,.48);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .16em;
            text-align: center;
            text-transform: uppercase;
        }

        @keyframes gridMove {
            from { background-position: 0 0, 0 0; }
            to { background-position: 42px 42px, 42px 42px; }
        }

        @keyframes scanlines {
            from { transform: translateY(0); }
            to { transform: translateY(12px); }
        }

        @keyframes ambientOne {
            to { transform: translate(100px,120px) scale(1.2); }
        }

        @keyframes ambientTwo {
            to { transform: translate(-100px,-100px) scale(1.15); }
        }

        @keyframes rotateRight { to { transform: rotate(360deg); } }
        @keyframes rotateLeft { to { transform: rotate(-360deg); } }

        @keyframes logoFloat {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-7px) scale(1.015); }
        }

        @keyframes glowPulse {
            0%,100% {
                box-shadow: 0 0 14px var(--cyan), 0 0 34px rgba(39,245,255,.42), 0 0 60px rgba(154,85,255,.22);
            }
            50% {
                box-shadow: 0 0 19px var(--cyan), 0 0 48px rgba(39,245,255,.72), 0 0 90px rgba(154,85,255,.42);
            }
        }

        @keyframes imageBreath {
            0%,100% { filter: brightness(1) contrast(1.05) saturate(1.08); }
            50% { filter: brightness(1.12) contrast(1.08) saturate(1.2); }
        }

        @keyframes haloPulse {
            0%,100% { opacity: .55; transform: scale(.94); }
            50% { opacity: 1; transform: scale(1.12); }
        }

        @keyframes logoShockwave {
            0% { opacity: .75; transform: scale(1); }
            80%,100% { opacity: 0; transform: scale(1.15); }
        }

        @keyframes shine {
            0%,15% { left: -85%; }
            52%,100% { left: 145%; }
        }

        @keyframes titlePulse {
            0%,100% { opacity: .94; }
            50% {
                opacity: 1;
                text-shadow: 0 0 6px #fff, 0 0 16px var(--cyan), 0 0 38px rgba(39,245,255,.78);
            }
        }

        @keyframes buttonScan {
            0%,18% { left: -65%; }
            58%,100% { left: 145%; }
        }

        @keyframes iconRotate { to { transform: rotate(360deg); } }

        @keyframes tagPulse {
            0%,100% { filter: brightness(1); }
            50% {
                filter: brightness(1.35);
                box-shadow: 0 0 11px #bd8cff, 0 0 26px rgba(154,85,255,.95);
            }
        }

        @media (max-width: 600px) {
            .page { padding-left: 17px; padding-right: 17px; }
            .logo-zone { width: 260px; height: 260px; }
            .ring-a { width: 244px; height: 244px; }
            .ring-b { width: 220px; height: 220px; }
            .ring-c { width: 202px; height: 202px; }

            .segment-ring {
                width: 232px;
                height: 232px;
                -webkit-mask: radial-gradient(circle, transparent 0 106px, #000 107px 115px, transparent 116px);
                mask: radial-gradient(circle, transparent 0 106px, #000 107px 115px, transparent 116px);
            }

            .logo-frame { width: 182px; height: 182px; }
            .subtitle { margin-bottom: 36px; }

            .cyber-button {
                min-height: 112px;
                padding: 17px 20px 17px 17px;
                grid-template-columns: 82px 1fr;
                gap: 14px;
            }

            .icon-wrap { width: 82px; height: 76px; }
            .icon-orbit { width: 67px; height: 67px; }
            .telegram-icon { width: 45px; height: 45px; }

            .launch-tag {
                right: 16px;
                min-width: 112px;
                padding: 6px 11px;
                font-size: 9px;
            }
        }

        @media (max-width: 390px) {
            .button-title { font-size: 18px; }
            .button-note { font-size: 9px; }
            .cyber-button { grid-template-columns: 72px 1fr; gap: 10px; }
            .icon-wrap { width: 72px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>

        </section>

        <footer class="footer">
