    <style>
        :root {
            --bg: #030518;
            --cyan: #27f5ff;
            --cyan-soft: rgba(39, 245, 255, 0.42);
            --cyan-dark: rgba(39, 245, 255, 0.12);
            --purple: #9a55ff;
            --purple-soft: rgba(154, 85, 255, 0.45);
            --purple-dark: rgba(154, 85, 255, 0.12);
            --white: #f8fbff;
            --muted: #b8c0d8;
            --content-width: 760px;
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--white);
            font-family: "Jura", sans-serif;
            background:
                radial-gradient(circle at 50% 0%, rgba(25, 213, 255, 0.16), transparent 38%),
                radial-gradient(circle at 80% 55%, rgba(132, 59, 255, 0.15), transparent 38%),
                radial-gradient(circle at 10% 95%, rgba(0, 214, 255, 0.1), transparent 38%),
                linear-gradient(180deg, #020817 0%, #06051b 48%, #040316 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(40, 223, 255, 0.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(40, 223, 255, 0.075) 1px, transparent 1px);
            background-size: 42px 42px;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.48));
            animation: gridMove 18s linear infinite;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -3;
            pointer-events: none;
            opacity: 0.2;
            background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(255,255,255,.025) 4px);
            animation: scanlines 12s linear infinite;
        }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .ambient::before,
        .ambient::after {
            content: "";
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .17;
        }

        .ambient::before {
            top: -170px;
            left: -220px;
            background: var(--cyan);
            animation: ambientOne 11s ease-in-out infinite alternate;
        }

        .ambient::after {
            right: -240px;
            bottom: -170px;
            background: var(--purple);
            animation: ambientTwo 13s ease-in-out infinite alternate;
        }

        .page {
            width: min(100%, var(--content-width));
            min-height: 100vh;
            margin: 0 auto;
            padding: max(36px, env(safe-area-inset-top)) 24px max(44px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-zone {
            position: relative;
            width: 310px;
            height: 310px;
            margin-top: 4px;
            display: grid;
            place-items: center;
            filter:
                drop-shadow(0 0 22px rgba(35, 238, 255, .22))
                drop-shadow(0 0 45px rgba(132, 70, 255, .14));
        }

        .logo-halo {
            position: absolute;
            width: 218px;
            height: 218px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37,245,255,.18), transparent 66%);
            filter: blur(8px);
            animation: haloPulse 3.3s ease-in-out infinite;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .ring-a {
            width: 284px;
            height: 284px;
            border: 2px dashed rgba(37,245,255,.39);
            box-shadow: inset 0 0 22px rgba(37,245,255,.08), 0 0 18px rgba(37,245,255,.08);
            animation: rotateRight 18s linear infinite;
        }

        .ring-b {
            width: 252px;
            height: 252px;
            border: 4px solid transparent;
            border-top-color: var(--purple);
            border-right-color: rgba(39,245,255,.85);
            border-bottom-color: rgba(154,85,255,.18);
            filter: drop-shadow(0 0 7px var(--purple-soft));
            animation: rotateLeft 9s linear infinite;
        }
